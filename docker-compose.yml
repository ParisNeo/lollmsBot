version: '3.8'

services:
  # AGENT ALPHA: The Lead Researcher
  alpha-agent:
    build: .
    container_name: alpha-agent
    volumes:
      - ./swarm_data/alpha:/root/.lollmsbot
      - ./swarm_souls/alpha_soul.md:/root/.lollmsbot/soul.md
    environment:
      - LOLLMSBOT_NAME=Alpha
      - LOLLMS_HOST_ADDRESS=http://your-llm-provider:9600
    networks:
      - swarm-net
    ports:
      - "8801:8800"

  # AGENT BETA: The Code Architect
  beta-agent:
    build: .
    container_name: beta-agent
    volumes:
      - ./swarm_data/beta:/root/.lollmsbot
      - ./swarm_souls/beta_soul.md:/root/.lollmsbot/soul.md
    environment:
      - LOLLMSBOT_NAME=Beta
      - LOLLMS_HOST_ADDRESS=http://your-llm-provider:9600
    networks:
      - swarm-net
    ports:
      - "8802:8800"

  # AGENT GAMMA: The Security Guardian
  gamma-agent:
    build: .
    container_name: gamma-agent
    volumes:
      - ./swarm_data/gamma:/root/.lollmsbot
      - ./swarm_souls/gamma_soul.md:/root/.lollmsbot/soul.md
    environment:
      - LOLLMSBOT_NAME=Gamma
      - LOLLMS_HOST_ADDRESS=http://your-llm-provider:9600
    networks:
      - swarm-net
    ports:
      - "8803:8800"

networks:
  swarm-net:
    driver: bridge